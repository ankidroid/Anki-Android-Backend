tasks.register('buildRust', Exec) {
    // ensure script doesn't try to start gradle again
    environment 'RUNNING_FROM_GRADLE', '1'

    def ndkEnv = System.getenv('ANDROID_NDK_HOME')
    if (!ndkEnv || !verifyNdkDir(ndkEnv))
        environment 'ANDROID_NDK_HOME', getNdkProp()

    workingDir "$rootDir"
    commandLine "cargo", "run", "-p", "build_rust"
}

def getNdkProp() {
    def localProperties = project.rootProject.file("local.properties")
    if (localProperties.exists())
    {
        Properties properties = new Properties()
        properties.load(localProperties.newDataInputStream())

        def ndkDir = properties.getProperty('ndk.dir')
        if (verifyNdkDir(ndkDir))
            return ndkDir
    }

    throw new GradleException('Unable to locate NDK directory. Use environment variable ANDROID_NDK_HOME, or ndk.dir in local.properties, to specify the path to a valid NDK 26.x installation.')
}

def verifyNdkDir(String path) {
    return new File(path, "build/ndk-build").exists()
}